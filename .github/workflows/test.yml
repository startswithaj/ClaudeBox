name: Test

# Runs the test bed (test/run.sh): builds a lean image and verifies the firewall,
# the CAP_NET_ADMIN drop, network egress, and rootless Docker end to end.

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run test bed
        run: test/run.sh
