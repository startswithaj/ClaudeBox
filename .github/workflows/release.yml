name: Release image

# On every merge/push to main: bump a SemVer tag, then build and publish the
# image to GitHub Container Registry for linux/amd64 + linux/arm64.
#
# The bump is patch by default; include "#minor" or "#major" anywhere in the
# latest commit message (e.g. the merge commit) to bump more. Can also be run
# manually from the Actions tab.
#
# Note: arm64 builds under QEMU emulation, so each release takes a while.

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write # create and push the version tag
  packages: write # push the image to ghcr

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # need full history + tags to compute the next version

      - name: Compute next version
        id: tag
        run: |
          git fetch --tags --force
          latest="$(git tag -l 'v*' --sort=-v:refname | head -1)"
          if [ -z "$latest" ]; then
            next="v0.1.0"
          else
            IFS=. read -r major minor patch <<< "${latest#v}"
            case "$(git log -1 --pretty=%B)" in
              *"#major"*) major=$((major + 1)); minor=0; patch=0 ;;
              *"#minor"*) minor=$((minor + 1)); patch=0 ;;
              *)          patch=$((patch + 1)) ;;
            esac
            next="v${major}.${minor}.${patch}"
          fi
          echo "new_tag=$next" >> "$GITHUB_OUTPUT"
          echo "Next version: $next"

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.tag.outputs.new_tag }}"
          git push origin "${{ steps.tag.outputs.new_tag }}"

      - name: Set up QEMU (arm64 emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=${{ steps.tag.outputs.new_tag }}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
